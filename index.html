<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DentinIaI — Neural Dental Systems</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@100;300;400&family=Courier+Prime&display=swap" rel="stylesheet">
    <style>
        :root { --cyan: #00ced1; --bg: #020505; --glass: rgba(0, 206, 209, 0.05); }
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; background: var(--bg); color: white; font-family: 'Inter', sans-serif; overflow: hidden; }

        /* Scanning Line Effect */
        body::before {
            content: ""; position: fixed; top: 0; left: 0; width: 100%; height: 4px;
            background: rgba(0, 206, 209, 0.1); z-index: 1000;
            animation: scan 4s linear infinite; pointer-events: none;
        }
        @keyframes scan { from { top: -10%; } to { top: 110%; } }

        /* Medical Aura */
        #cursor-aura {
            position: fixed; top: 0; left: 0; width: 600px; height: 600px;
            background: radial-gradient(circle, rgba(0, 206, 209, 0.07) 0%, transparent 75%);
            transform: translate(-50%, -50%); pointer-events: none; z-index: 0; 
            transition: transform 0.15s ease-out;
        }

        .grid-bg {
            position: fixed; width: 200%; height: 200%;
            background-image: linear-gradient(var(--glass) 1px, transparent 1px), 
                              linear-gradient(90deg, var(--glass) 1px, transparent 1px);
            background-size: 50px 50px; transform: rotate(-5deg); top: -50%; left: -50%; z-index: -1;
        }

        /* Overlay */
        #dtn-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #000;
            z-index: 10000; display: flex; flex-direction: column; justify-content: center; align-items: center;
            font-family: 'Courier Prime', monospace; color: var(--cyan); transition: opacity 1.5s ease;
        }

        .logo { 
            font-size: clamp(3rem, 10vw, 8rem); font-weight: 100; letter-spacing: 20px; 
            background: linear-gradient(180deg, #fff 30%, var(--cyan) 90%);
            -webkit-background-clip: text; background-clip: text; color: transparent;
            filter: drop-shadow(0 0 20px rgba(0, 206, 209, 0.3)); cursor: default;
        }

        .badge { border: 1px solid var(--cyan); color: var(--cyan); font-size: 0.6rem; padding: 8px 25px; letter-spacing: 5px; margin: 30px 0; display: inline-block; background: rgba(0,0,0,0.8); }
        
        .enter-btn { 
            margin-top: 50px; padding: 15px 50px; background: transparent; border: 1px solid #111; 
            color: var(--cyan); cursor: pointer; letter-spacing: 5px; font-size: 0.7rem; transition: 0.5s; 
            backdrop-filter: blur(10px); outline: none; position: relative;
        }
        .enter-btn:hover { border-color: var(--cyan); box-shadow: 0 0 30px rgba(0, 206, 209, 0.2); }

        #dashboard { display: none; width: 85%; max-width: 1100px; margin: 0 auto; padding: 100px 0; opacity: 0; transition: 1.5s ease; }
        .node { background: rgba(255, 255, 255, 0.02); border: 1px solid rgba(0, 206, 209, 0.1); padding: 40px; transition: 0.5s; backdrop-filter: blur(20px); }
        .node:hover { border-color: var(--cyan); background: rgba(0, 206, 209, 0.03); }

    </style>
</head>
<body>

    <div id="cursor-aura"></div>
    <div class="grid-bg"></div>

    <div id="dtn-overlay">
        <div id="neural-text" style="letter-spacing: 4px; font-size: 0.8rem;"></div>
        <div style="width: 200px; height: 1px; background: #111; margin-top: 30px; position: relative;">
            <div id="progress" style="width: 0%; height: 100%; background: var(--cyan); transition: 0.5s;"></div>
        </div>
    </div>

    <div class="container" style="text-align: center; position: relative; z-index: 10;" id="main-view">
        <h1 class="logo">DentinIaI</h1>
        <div class="badge">SECURE BIOLOGICAL INTERFACE</div>
        <p style="color: #555; font-size: 0.7rem; letter-spacing: 3px; font-weight: 300; line-height: 2;">
            DentinIaI Architecture © 2026 <br>
            <span style="color: var(--cyan); opacity: 0.6;">Proprietary System | Founded & Architected by 0IaI</span>
        </p>
        <button class="enter-btn" onclick="openSystem()">INITIALIZE BIOMETRIC SCAN</button>
    </div>

    <div id="dashboard">
        <div style="display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 40px;">
            <div class="node">
                <h3 style="letter-spacing: 5px; color: var(--cyan); font-weight: 300;">STRUCTURAL.MAP</h3>
                <p style="font-size: 0.7rem; color: #777; line-height: 1.8;">Real-time biological decoding of dentin structures via Neural Mesh v2.</p>
                <div style="width: 100%; height: 2px; background: #111; margin-top: 20px;"><div style="width: 92%; height: 100%; background: var(--cyan);"></div></div>
            </div>
            <div class="node">
                <h3 style="letter-spacing: 5px; color: var(--cyan); font-weight: 300;">ANOMALY.DETECTION</h3>
                <p style="font-size: 0.7rem; color: #777; line-height: 1.8;">AI-driven predictive analysis for early-stage biological degradation.</p>
                <div style="width: 100%; height: 2px; background: #111; margin-top: 20px;"><div style="width: 45%; height: 100%; background: var(--cyan);"></div></div>
            </div>
        </div>
    </div>

    <script>
        const aura = document.getElementById('cursor-aura');
        document.addEventListener('mousemove', (e) => {
            aura.style.left = e.clientX + 'px';
            aura.style.top = e.clientY + 'px';
        });

        const bootMsgs = ["> ACCESSING BIOLOGICAL CORE...", "> SYNCING NEURAL DENTIN ENGINE...", "> AUTHENTICATING 0IaI CREDENTIALS...", "> SCANNER ONLINE."];
        let idx = 0;
        function startBoot() {
            if(idx < bootMsgs.length) {
                document.getElementById('neural-text').innerText = bootMsgs[idx];
                document.getElementById('progress').style.width = ((idx+1)*25) + "%";
                idx++; setTimeout(startBoot, 1000);
            } else {
                setTimeout(() => {
                    document.getElementById('dtn-overlay').style.opacity = "0";
                    setTimeout(() => document.getElementById('dtn-overlay').style.display = "none", 1500);
                }, 500);
            }
        }

        function openSystem() {
            const main = document.getElementById('main-view');
            const dash = document.getElementById('dashboard');
            main.style.opacity = "0";
            main.style.transform = "scale(0.95)";
            setTimeout(() => {
                main.style.display = "none";
                dash.style.display = "block";
                setTimeout(() => { dash.style.opacity = "1"; }, 100);
            }, 1000);
        }
        window.onload = startBoot;
    </script>
</body>
</html>
